<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Indian election process flow illustration</title>
  <desc id="desc">A vertical visual flow from voter roll and nomination to polling, strongroom, counting, and results.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset=".52" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#e8f5e6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#121826" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="720" height="900" fill="url(#bg)"/>
  <g opacity=".20" stroke="#1e40af" stroke-width="2">
    <path d="M65 80h590M65 160h590M65 240h590M65 320h590M65 400h590M65 480h590M65 560h590M65 640h590M65 720h590M65 800h590"/>
    <path d="M120 50v810M240 50v810M360 50v810M480 50v810M600 50v810"/>
  </g>
  <path d="M360 104v688" fill="none" stroke="#d7dfeb" stroke-width="16" stroke-linecap="round"/>
  <path d="M360 104v210" fill="none" stroke="#ff7a1a" stroke-width="16" stroke-linecap="round"/>
  <path d="M360 314v235" fill="none" stroke="#1e40af" stroke-width="16" stroke-linecap="round"/>
  <path d="M360 549v243" fill="none" stroke="#138808" stroke-width="16" stroke-linecap="round"/>
  <g font-family="Fira Sans, Arial" filter="url(#shadow)">
    <g transform="translate(86 86)">
      <rect width="260" height="126" rx="18" fill="#fff"/>
      <circle cx="48" cy="64" r="27" fill="#fff4eb"/>
      <path d="M36 64h24M48 52v24" stroke="#ff7a1a" stroke-width="6" stroke-linecap="round"/>
      <text x="88" y="54" font-size="23" font-weight="800" fill="#121826">Roll Check</text>
      <text x="88" y="84" font-size="16" font-weight="700" fill="#5f6b7a">Verify name and EPIC</text>
    </g>
    <g transform="translate(374 198)">
      <rect width="260" height="126" rx="18" fill="#fff"/>
      <circle cx="48" cy="64" r="27" fill="#eaf0ff"/>
      <path d="M37 76V49h22l12 12v15Z" fill="none" stroke="#1e40af" stroke-width="5" stroke-linejoin="round"/>
      <text x="88" y="54" font-size="23" font-weight="800" fill="#121826">Nomination</text>
      <text x="88" y="84" font-size="16" font-weight="700" fill="#5f6b7a">Candidate paperwork</text>
    </g>
    <g transform="translate(86 310)">
      <rect width="260" height="126" rx="18" fill="#fff"/>
      <circle cx="48" cy="64" r="27" fill="#fff4eb"/>
      <path d="M34 54h28l10 20H44Z" fill="none" stroke="#ff7a1a" stroke-width="5" stroke-linejoin="round"/>
      <path d="M44 54v-14h18v14" fill="none" stroke="#ff7a1a" stroke-width="5"/>
      <text x="88" y="54" font-size="23" font-weight="800" fill="#121826">Campaign</text>
      <text x="88" y="84" font-size="16" font-weight="700" fill="#5f6b7a">MCC and silent period</text>
    </g>
    <g transform="translate(374 422)">
      <rect width="260" height="126" rx="18" fill="#fff"/>
      <circle cx="48" cy="64" r="27" fill="#eaf0ff"/>
      <rect x="34" y="42" width="30" height="44" rx="5" fill="none" stroke="#1e40af" stroke-width="5"/>
      <path d="m40 64 8 8 17-22" fill="none" stroke="#138808" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="88" y="54" font-size="23" font-weight="800" fill="#121826">Polling</text>
      <text x="88" y="84" font-size="16" font-weight="700" fill="#5f6b7a">EVM and VVPAT</text>
    </g>
    <g transform="translate(86 534)">
      <rect width="260" height="126" rx="18" fill="#fff"/>
      <circle cx="48" cy="64" r="27" fill="#e8f5e6"/>
      <rect x="33" y="50" width="36" height="34" rx="6" fill="none" stroke="#138808" stroke-width="5"/>
      <path d="M42 50v-9a15 15 0 0 1 30 0v9" fill="none" stroke="#138808" stroke-width="5"/>
      <text x="88" y="54" font-size="23" font-weight="800" fill="#121826">Strongroom</text>
      <text x="88" y="84" font-size="16" font-weight="700" fill="#5f6b7a">Sealed and guarded</text>
    </g>
    <g transform="translate(374 646)">
      <rect width="260" height="126" rx="18" fill="#fff"/>
      <circle cx="48" cy="64" r="27" fill="#e8f5e6"/>
      <path d="M35 82V50M49 82V39M63 82V58" stroke="#138808" stroke-width="6" stroke-linecap="round"/>
      <text x="88" y="54" font-size="23" font-weight="800" fill="#121826">Counting</text>
      <text x="88" y="84" font-size="16" font-weight="700" fill="#5f6b7a">Rounds and observers</text>
    </g>
  </g>
  <g>
    <circle cx="360" cy="126" r="22" fill="#ff7a1a" stroke="#fff" stroke-width="8"/>
    <circle cx="360" cy="238" r="22" fill="#ff7a1a" stroke="#fff" stroke-width="8"/>
    <circle cx="360" cy="350" r="22" fill="#ff7a1a" stroke="#fff" stroke-width="8"/>
    <circle cx="360" cy="462" r="22" fill="#1e40af" stroke="#fff" stroke-width="8"/>
    <circle cx="360" cy="574" r="22" fill="#138808" stroke="#fff" stroke-width="8"/>
    <circle cx="360" cy="686" r="22" fill="#138808" stroke="#fff" stroke-width="8"/>
  </g>
  <rect x="110" y="810" width="500" height="52" rx="26" fill="#fff" opacity=".92"/>
  <text x="360" y="844" text-anchor="middle" fill="#1e40af" font-family="Fira Sans, Arial" font-size="22" font-weight="800">Official process. Clear steps. Neutral guidance.</text>
</svg>
